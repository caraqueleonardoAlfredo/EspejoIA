<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Espejo IA</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="screen screen-off" id="screen">
    <div class="topbar">
      <div class="estado" id="estado">ESPERANDO PRESENCIA</div>
      <div class="modo" id="modo">MODO: INFO</div>
    </div>

    <div class="panel panel-info" id="panelInfo">
      <div class="hora" id="hora">--:--</div>
      <div class="fecha" id="fecha">--</div>

      <div class="info-grid">
        <div class="info-card">
          <div class="label">Clima</div>
          <div class="value" id="clima">--</div>
        </div>

        <div class="info-card">
          <div class="label">Temperatura</div>
          <div class="value" id="temperatura">--</div>
        </div>

        <div class="info-card">
          <div class="label">Humedad</div>
          <div class="value" id="humedad">--</div>
        </div>

        <div class="info-card">
          <div class="label">D�lar</div>
          <div class="value" id="dolar">--</div>
        </div>
      </div>

      <div class="frase" id="frase">Desliza la mano para cambiar de modo</div>
    </div>

    <div class="panel panel-domotica" id="panelDomotica" style="display:none;">
      <iframe
        id="haFrame"
        title="Home Assistant"
        src=""
        allow="fullscreen">
      </iframe>
    </div>

    <div class="panel panel-ia" id="panelIA" style="display:none;">
      <div class="ia-title">Dianuby IA</div>
      <div class="ia-status" id="iaStatus">IA</div>
      <div class="ia-subtitle" id="iaSubtitle">Manten� presionado el bot�n para hablar</div>

      <button class="ia-talk-button" id="iaTalkButton" type="button">
        MANTEN� PRESIONADO PARA HABLAR
      </button>

      <div class="ia-transcript" id="iaTranscript">Tu pregunta aparecer� aqu�</div>
    </div>
  </div>

    <script>
    const horaEl = document.getElementById("hora");
    const fechaEl = document.getElementById("fecha");
    const estadoEl = document.getElementById("estado");
    const modoEl = document.getElementById("modo");
    const fraseEl = document.getElementById("frase");

    const climaEl = document.getElementById("clima");
    const temperaturaEl = document.getElementById("temperatura");
    const humedadEl = document.getElementById("humedad");
    const dolarEl = document.getElementById("dolar");

    const panelInfo = document.getElementById("panelInfo");
    const panelDomotica = document.getElementById("panelDomotica");
    const panelIA = document.getElementById("panelIA");
    const haFrame = document.getElementById("haFrame");
    const screen = document.getElementById("screen");

    const iaStatus = document.getElementById("iaStatus");
    const iaSubtitle = document.getElementById("iaSubtitle");
    const iaTalkButton = document.getElementById("iaTalkButton");
    const iaTranscript = document.getElementById("iaTranscript");

    let ultimoModo = null;
    let haCargado = false;

    let iaMediaRecorder = null;
    let iaChunks = [];
    let iaStream = null;
    let iaRecording = false;
    let iaProcessing = false;

    function actualizarHoraLocal() {
        const ahora = new Date();

        horaEl.textContent = ahora.toLocaleTimeString("es-AR", {
          hour: "2-digit",
          minute: "2-digit"
        });

        fechaEl.textContent = ahora.toLocaleDateString("es-AR", {
          weekday: "long",
          day: "2-digit",
          month: "long"
        });
      }

    function setIALocalState(status, subtitle, buttonPressed = false) {
      iaStatus.textContent = status;
      iaSubtitle.textContent = subtitle;

      if (buttonPressed) {
        iaTalkButton.classList.add("recording");
      } else {
        iaTalkButton.classList.remove("recording");
      }
    }

    async function ensureIAStream() {
      if (iaStream) return iaStream;

      iaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      return iaStream;
    }

    function createRecorder(stream) {
      let options = {};

      if (window.MediaRecorder && MediaRecorder.isTypeSupported("audio/webm;codecs=opus")) {
        options.mimeType = "audio/webm;codecs=opus";
      }

      return new MediaRecorder(stream, options);
    }

    async function startIARecording() {
      if (ultimoModo !== "IA") return;
      if (iaRecording || iaProcessing) return;

      try {
        const stream = await ensureIAStream();

        iaChunks = [];
        iaMediaRecorder = createRecorder(stream);

        iaMediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            iaChunks.push(event.data);
          }
        };

        iaMediaRecorder.onstop = async () => {
          iaRecording = false;
          iaProcessing = true;
          setIALocalState("PROCESANDO", "Procesando...", false);

          const blob = new Blob(iaChunks, { type: iaMediaRecorder.mimeType || "audio/webm" });
          const formData = new FormData();
          formData.append("audio", blob, "pregunta.webm");

          try {
            const response = await fetch("/api/ia/process_audio", {
              method: "POST",
              body: formData
            });

            const data = await response.json();

            if (data.ok) {
              iaTranscript.textContent = data.transcript || "Sin transcripci�n";
              setIALocalState("IA", data.response || "Respuesta generada", false);
            } else {
              iaTranscript.textContent = "Sin transcripci�n";
              setIALocalState("IA", data.error || "Error procesando audio", false);
            }
          } catch (error) {
            console.error("Error enviando audio:", error);
            iaTranscript.textContent = "Sin transcripci�n";
            setIALocalState("IA", "Error de conexi�n al procesar audio", false);
          } finally {
            iaProcessing = false;
          }
        };

        iaMediaRecorder.start();
        iaRecording = true;
        iaTranscript.textContent = "Grabando pregunta...";
        setIALocalState("ESCUCHANDO", "Escuchando... solt� para procesar", true);

      } catch (error) {
        console.error("Error iniciando grabaci�n:", error);
        setIALocalState("IA", "No se pudo acceder al micr�fono del navegador", false);
      }
    }

    function stopIARecording() {
      if (!iaRecording || !iaMediaRecorder) return;

      try {
        if (iaMediaRecorder.state !== "inactive") {
          iaMediaRecorder.stop();
        }
      } catch (error) {
        console.error("Error deteniendo grabaci�n:", error);
      }
    }

    async function actualizarStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();

        estadoEl.textContent = data.estado || "FUNCIONANDO";
        modoEl.textContent = `MODO: ${data.modo || "INFO"}`;

        if (data.modo === "INFO") {
          panelInfo.style.display = "flex";
          panelDomotica.style.display = "none";
          panelIA.style.display = "none";
          fraseEl.textContent = data.frase || "Desliza la mano para cambiar de modo";
        } else if (data.modo === "DOMOTICA") {
          panelInfo.style.display = "none";
          panelDomotica.style.display = "block";
          panelIA.style.display = "none";

          if (!haCargado || ultimoModo !== "DOMOTICA") {
            haFrame.src = data.ha_url || "";
            haCargado = true;
          }
        } else if (data.modo === "IA") {
          panelInfo.style.display = "none";
          panelDomotica.style.display = "none";
          panelIA.style.display = "flex";

          if (!iaRecording && !iaProcessing) {
            iaStatus.textContent = data.estado || "IA";
            iaSubtitle.textContent = data.frase || "Manten� presionado el bot�n para hablar";
          }
        }

        if (ultimoModo === "DOMOTICA" && data.modo !== "DOMOTICA") {
          haFrame.src = "";
          haCargado = false;
        }

        if (ultimoModo === "IA" && data.modo !== "IA") {
          if (iaRecording) stopIARecording();
          iaRecording = false;
          iaProcessing = false;
          iaTalkButton.classList.remove("recording");
        }

        if (data.screen_on === false) {
          screen.classList.add("screen-off");
        } else {
          screen.classList.remove("screen-off");
        }

        ultimoModo = data.modo;
      } catch (error) {
        console.error("Error al actualizar status:", error);
        estadoEl.textContent = "ERROR DE CONEXION";
      }
    }

    async function actualizarInfo() {
      try {
        const res = await fetch("/api/info");
        const data = await res.json();

        climaEl.textContent = data.clima || "--";
        temperaturaEl.textContent = data.temperatura || "--";
        humedadEl.textContent = data.humedad || "--";
        dolarEl.textContent = data.dolar || "--";

        if (ultimoModo === "INFO") {
          fraseEl.textContent = data.mensaje_info || "Desliza la mano para cambiar de modo";
        }
      } catch (error) {
        console.error("Error al actualizar info:", error);
        climaEl.textContent = "--";
        temperaturaEl.textContent = "--";
        humedadEl.textContent = "--";
        dolarEl.textContent = "--";
      }
    }

    iaTalkButton.addEventListener("pointerdown", async (e) => {
      e.preventDefault();
      await startIARecording();
    });

    iaTalkButton.addEventListener("pointerup", (e) => {
      e.preventDefault();
      stopIARecording();
    });

    iaTalkButton.addEventListener("pointercancel", (e) => {
      e.preventDefault();
      stopIARecording();
    });

    iaTalkButton.addEventListener("pointerleave", (e) => {
      if (iaRecording) {
        e.preventDefault();
        stopIARecording();
      }
    });

    actualizarHoraLocal();
    actualizarStatus();
    actualizarInfo();

    setInterval(actualizarHoraLocal, 1000);
    setInterval(actualizarStatus, 500);
    setInterval(actualizarInfo, 300000);
      </script>
    </body>
</html>
