<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Espejo IA</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="screen" id="screen">
    <div class="topbar">
      <div class="estado" id="estado">CARGANDO...</div>
      <div class="modo" id="modo">MODO: ...</div>
    </div>

    <div class="panel panel-info" id="panelInfo">
      <div class="hora" id="hora">--:--</div>
      <div class="fecha" id="fecha">--</div>

      <div class="info-grid">
        <div class="info-card">
          <div class="label">Clima</div>
          <div class="value" id="clima">--</div>
        </div>

        <div class="info-card">
          <div class="label">Temperatura</div>
          <div class="value" id="temperatura">--</div>
        </div>

        <div class="info-card">
          <div class="label">Humedad</div>
          <div class="value" id="humedad">--</div>
        </div>

        <div class="info-card">
          <div class="label">Dolar</div>
          <div class="value" id="dolar">--</div>
        </div>
      </div>

      <div class="frase" id="frase">Desliza la mano para cambiar de modo</div>
    </div>

    <div class="panel panel-domotica" id="panelDomotica" style="display:none;">
      <iframe
        id="haFrame"
        title="Home Assistant"
        src=""
        allow="fullscreen">
      </iframe>
    </div>

    <div class="panel panel-ia" id="panelIA" style="display:none;">
      <div class="ia-title">Dianuby IA</div>
      <div class="ia-subtitle">Preguntame algo...</div>
    </div>
  </div>
  <script>
    const horaEl = document.getElementById("hora");
    const fechaEl = document.getElementById("fecha");
    const estadoEl = document.getElementById("estado");
    const modoEl = document.getElementById("modo");
    const fraseEl = document.getElementById("frase");

    const climaEl = document.getElementById("clima");
    const temperaturaEl = document.getElementById("temperatura");
    const humedadEl = document.getElementById("humedad");
    const dolarEl = document.getElementById("dolar");

    const panelInfo = document.getElementById("panelInfo");
    const panelDomotica = document.getElementById("panelDomotica");
    const panelIA = document.getElementById("panelIA");
    const haFrame = document.getElementById("haFrame");
    const screen = document.getElementById("screen");

    let ultimoModo = null;
    let haCargado = false;

    function actualizarHoraLocal() {
      const ahora = new Date();

      horaEl.textContent = ahora.toLocaleTimeString("es-AR", {
        hour: "2-digit",
        minute: "2-digit"
      });

      fechaEl.textContent = ahora.toLocaleDateString("es-AR", {
        weekday: "long",
        day: "2-digit",
        month: "long"
      });
    }

    async function actualizarStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();

        estadoEl.textContent = data.estado || "FUNCIONANDO";
        modoEl.textContent = `MODO: ${data.modo || "INFO"}`;

        if (data.modo === "INFO") {
          panelInfo.style.display = "flex";
          panelDomotica.style.display = "none";
          panelIA.style.display = "none";
          fraseEl.textContent = data.frase || "Desliza la mano para cambiar de modo";
        } else if (data.modo === "DOMOTICA") {
          panelInfo.style.display = "none";
          panelDomotica.style.display = "block";
          panelIA.style.display = "none";

          if (!haCargado || ultimoModo !== "DOMOTICA") {
            haFrame.src = data.ha_url || "";
            haCargado = true;
          }
        } else if (data.modo === "IA") {
          panelInfo.style.display = "none";
          panelDomotica.style.display = "none";
          panelIA.style.display = "flex";
        }

        if (ultimoModo === "DOMOTICA" && data.modo !== "DOMOTICA") {
          haFrame.src = "";
          haCargado = false;
        }

        if (data.screen_on === false) {
          screen.classList.add("screen-off");
        } else {
          screen.classList.remove("screen-off");
        }

        ultimoModo = data.modo;
      } catch (error) {
        console.error("Error al actualizar status:", error);
        estadoEl.textContent = "ERROR DE CONEXION";
      }
    }

    async function actualizarInfo() {
      try {
        const res = await fetch("/api/info");
        const data = await res.json();

        climaEl.textContent = data.clima || "--";
        temperaturaEl.textContent = data.temperatura || "--";
        humedadEl.textContent = data.humedad || "--";
        dolarEl.textContent = data.dolar || "--";

        if (ultimoModo === "INFO") {
          fraseEl.textContent = data.mensaje_info || "Desliza la mano para cambiar de modo";
        }
      } catch (error) {
        console.error("Error al actualizar info:", error);
        climaEl.textContent = "--";
        temperaturaEl.textContent = "--";
        humedadEl.textContent = "--";
        dolarEl.textContent = "--";
      }
    }

    actualizarHoraLocal();
    actualizarStatus();
    actualizarInfo();

    setInterval(actualizarHoraLocal, 1000);
    setInterval(actualizarStatus, 3000);
    setInterval(actualizarInfo, 300000);
  </script>
</body>
</html>
